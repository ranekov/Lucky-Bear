<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GitHub Pages Tree Viewer</title>

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --text: #e5e7eb;
  --hover: #1f2937;
}

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

.header {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
}

.tree {
  background: var(--card);
  padding: 10px;
  border-radius: 12px;
}

ul {
  list-style: none;
  padding-left: 18px;
  margin: 0;
}

li {
  margin: 4px 0;
}

.node, a.node {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  text-decoration: none;
  color: var(--text);
}

.node:hover, a.node:hover {
  background: var(--hover);
}

.folder::before { content: "📁 "; }
.file::before { content: "📄 "; }

.children {
  margin-left: 14px;
  border-left: 1px solid #374151;
  padding-left: 10px;
  display: none;
}

.open > .children {
  display: block;
}

@media (max-width: 600px) {
  .app { padding: 10px; }
}
</style>
</head>

<body>

<div class="app">
  <div class="header">📁 GitHub Pages File Tree</div>
  <div id="tree" class="tree"></div>
</div>

<script>
const owner = "ranekov";
const repo = "Lucky-Bear";
const branch = "main";

function getPagesUrl(path) {
  return `https://${owner}.github.io/${repo}/${encodeURI(path)}`;
}

async function loadTree() {
  const res = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
  );

  const data = await res.json();

  let currentPath = decodeURIComponent(location.pathname);

  const repoPrefix = `/${repo}/`;

  if (currentPath.startsWith(repoPrefix)) {
    currentPath = currentPath.slice(repoPrefix.length);
  } else {
    currentPath = currentPath.replace(/^\/+/, "");
  }

  if (
    currentPath === "" ||
    currentPath.endsWith("/")
  ) {
    currentPath += "index.html";
  }

  const tree = {};

  data.tree.forEach(item => {
    if (
      item.type === "blob" &&
      item.path === currentPath
    ) {
      return;
    }

    const parts = item.path.split("/");
    let current = tree;

    parts.forEach((part, i) => {
      if (!current[part]) {
        current[part] =
          (i === parts.length - 1 && item.type === "blob")
            ? null
            : {};
      }
      current = current[part];
    });
  });

  document.getElementById("tree").innerHTML = render(tree);
  bindToggle();
}

function render(obj, parentPath = "") {
  let html = "<ul>";

  for (const key in obj) {
    const fullPath = parentPath ? `${parentPath}/${key}` : key;
    const isFolder = obj[key] !== null;

    html += "<li>";

    if (isFolder) {
      html += `
        <div class="node folder toggle">
          ${key}
        </div>
        <div class="children">
          ${render(obj[key], fullPath)}
        </div>
      `;
    } else {
      html += `
        <a class="node file"
           href="${getPagesUrl(fullPath)}"
           target="_blank"
           rel="noopener noreferrer">
          ${key}
        </a>
      `;
    }

    html += "</li>";
  }

  html += "</ul>";
  return html;
}

function bindToggle() {
  document.querySelectorAll(".toggle").forEach(el => {
    el.addEventListener("click", e => {
      e.preventDefault();
      e.stopPropagation();
      el.parentElement.classList.toggle("open");
    });
  });
}

loadTree();
</script>

</body>
</html>
