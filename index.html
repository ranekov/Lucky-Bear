<div class="app">
  <div class="header">📁 GitHub Repo Tree</div>
  <div id="tree" class="tree"></div>
</div>

<style>
:root {
  --bg: #0f172a;
  --card: #111827;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --accent: #60a5fa;
  --hover: #1f2937;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
}

.app {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px;
}

.header {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
}

.tree {
  background: var(--card);
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

ul {
  list-style: none;
  padding-left: 18px;
  margin: 0;
}

li {
  margin: 4px 0;
}

.node {
  display: flex;
  align-items: center;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
  transition: 0.2s;
}

.node:hover {
  background: var(--hover);
}

.folder::before {
  content: "📁";
  margin-right: 8px;
}

.file::before {
  content: "📄";
  margin-right: 8px;
}

.children {
  margin-left: 14px;
  border-left: 1px solid #374151;
  padding-left: 10px;
  display: none;
}

.open > .children {
  display: block;
}

.toggle {
  user-select: none;
}

@media (max-width: 600px) {
  .app {
    padding: 10px;
  }
}
</style>

<script>
const owner = "ranekov";
const repo = "Lucky-Bear";
const branch = "main";

async function loadTree() {
  const res = await fetch(
    `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`
  );
  const data = await res.json();

  const tree = {};
  data.tree.forEach(item => {
    const parts = item.path.split("/");
    let current = tree;

    parts.forEach((part, i) => {
      if (!current[part]) {
        current[part] =
          (i === parts.length - 1 && item.type === "blob")
            ? null
            : {};
      }
      current = current[part];
    });
  });

  document.getElementById("tree").innerHTML = render(tree);
  bindToggle();
}

function render(obj) {
  let html = "<ul>";
  for (const key in obj) {
    const isFolder = obj[key] !== null;

    html += `
      <li>
        <div class="node ${isFolder ? "folder toggle" : "file"}">
          ${key}
        </div>
    `;

    if (isFolder) {
      html += `<div class="children">${render(obj[key])}</div>`;
    }

    html += "</li>";
  }
  html += "</ul>";
  return html;
}

function bindToggle() {
  document.querySelectorAll(".toggle").forEach(el => {
    el.addEventListener("click", e => {
      e.stopPropagation();
      el.parentElement.classList.toggle("open");
    });
  });
}

loadTree();
</script>
